# Regional product markets. Product prices are modelled as a constant crack
# (differential, $/bbl) over the regional benchmark's futures curve:
#   product_price(cut, date) = benchmark_curve(date) + crack(cut)
# i.e. cracks are flat in time and the forward structure of products is
# inherited from the crude benchmark. This is THE simplification that makes
# product forwards possible without Platts/Argus -- stated in the README.
# Crack defaults are ILLUSTRATIVE, editable in-app.

wam:   # West Africa
  benchmark: brent
  cracks:
    lpg: -15.0
    naphtha: 2.0
    gasoline: 12.0
    kero: 14.0
    diesel: 18.0
    vgo: -7.0
    residue: -24.0

